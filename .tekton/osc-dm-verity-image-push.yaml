apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/confidential-devhub/coco-podvm-scripts?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "push" && target_branch
      == "main"
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: openshift-sandboxed-containers
    appstudio.openshift.io/component: osc-dm-verity-image
    pipelines.appstudio.openshift.io/type: build
  name: osc-dm-verity-image-on-push
  namespace: ose-osc-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/redhat-user-workloads/ose-osc-tenant/osc-dm-verity-image:{{revision}}
  - name: dockerfile
    value: Dockerfile
  - name: LABELS
    value: >
      com.redhat.component=osc-dm-verity-image,
      description=PodVM with DM-Verity support,
      distribution-scope=private,
      io.k8s.description=PodVM image for confidential computing with device mapper verity support,
      name=openshift-sandboxed-containers/osc-dm-verity-image,
      cpe=cpe:/a:redhat:confidential_compute_attestation:1.12::el9,
      release=1,
      url=https://github.com/confidential-devhub/coco-podvm-scripts,
      vcs-ref=main,
      vcs-type=git,
      vendor=Red Hat,
      version=1.12
  taskRunSpecs:
    - pipelineTaskName: build-vm-image
      stepSpecs:
        - name: download-rhel-image
          computeResources:
            requests:
              memory: 8Gi
            limits:
              memory: 8Gi
  pipelineRef:
    name: build-pipeline
  taskRunTemplate:
    serviceAccountName: build-pipeline-osc-dm-verity-image
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
